<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Thomas Willwacher Hausverwaltung</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Sans+3:ital,wght@0,300;0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
button{-webkit-tap-highlight-color:rgba(30,136,229,0.2);touch-action:manipulation;-webkit-user-select:none;user-select:none;cursor:pointer}

:root{
  --bg-primary:#0f1923; --bg-secondary:#1a2a3c; --bg-tertiary:#223448; --bg-card:#2a3a50; --bg-hover:#324560;
  --accent-red:#c41e1e; --accent-red-light:#e63535; --accent-blue:#4da6ff; --accent-orange:#e67e22; --accent-orange-light:#f39c12;
  --text-primary:#e8ecf1; --text-secondary:#b0c0d4; --text-white:#f0f2f5; --text-light:#b8c4d4; --text-muted:#8a9ab4;
  --border-color:#2e4562; --success:#27ae60;
  --shadow-lg:0 10px 40px rgba(0,0,0,0.4); --shadow-md:0 4px 20px rgba(0,0,0,0.3);
  --radius-sm:6px; --radius-md:12px; --radius-lg:20px;
  --grad-blue:linear-gradient(135deg,#1E88E5,#1565C0);
  --grad-red:linear-gradient(135deg,var(--accent-red-light),var(--accent-red));
  --sh-blue:rgba(30,136,229,0.30);
}
html,body{height:100%;font-family:'Source Sans 3',-apple-system,sans-serif;background:var(--bg-primary);color:var(--text-white);overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* Kachel-Textur im Hintergrund (wie Master-App) */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    linear-gradient(45deg, rgba(255,255,255,0.015) 25%, transparent 25%),
    linear-gradient(-45deg, rgba(255,255,255,0.015) 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, rgba(255,255,255,0.015) 75%),
    linear-gradient(-45deg, transparent 75%, rgba(255,255,255,0.015) 75%);
  background-size:40px 40px;background-position:0 0,0 20px,20px -20px,-20px 0;
}
.page{position:relative;z-index:1;padding:24px 16px 56px;min-height:100vh;max-width:640px;margin:0 auto}

/* ── LOGO (1:1 Master-App, weißer Schriftzug, roter Akzent) ── */
.logo-wrap{display:flex;justify-content:center;margin-bottom:14px;animation:fadeInDown .7s ease-out}
.logo-container{display:inline-flex;flex-direction:column;align-items:flex-start;user-select:none;transform-origin:center}
.logo-thomas-row{display:flex;align-items:baseline;margin-bottom:-18px;padding-left:1px;align-self:flex-start;position:relative;z-index:2}
.logo-thomas-text{font-family:'Source Sans 3',serif;font-style:italic;font-weight:700;color:var(--accent-red);font-size:14.5px;letter-spacing:.3px}
.logo-word-row{display:flex;align-items:baseline;font-family:'Oswald',sans-serif;font-weight:700;color:var(--text-white);line-height:1}
.logo-w,.logo-wacher,.logo-i-wrap,.logo-i-wrap .logo-i-char{font-size:62px}
.logo-i-wrap{position:relative;display:inline-block}
.logo-i-dot{position:absolute;top:6px;left:50%;transform:translateX(-50%);width:10px;height:10px;background:var(--accent-red)}
.logo-LL{font-size:84px;letter-spacing:1px;line-height:.75}
.logo-subtitle-row{display:flex;justify-content:flex-end;width:100%;margin-top:1px}
.logo-subtitle-text{font-family:'Source Sans 3',sans-serif;font-weight:600;color:var(--accent-red);font-size:14.5px;letter-spacing:2.5px}

/* Kopfblock (Logo + Titel + Label) */
.kopf{text-align:center;margin-bottom:24px}
.kopf .titel{margin-top:12px;font-size:19px;font-weight:700;color:var(--text-white);font-family:'Oswald',sans-serif;letter-spacing:.5px}
.kopf .label{font-size:11px;color:var(--text-muted);margin-top:4px;letter-spacing:2px;text-transform:uppercase;font-family:'Oswald',sans-serif;font-weight:500}
.detailzeile{font-size:12px;color:var(--text-muted);margin-top:8px;font-family:'Source Sans 3',sans-serif}

@keyframes fadeInDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:none}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.reveal{animation:fadeInUp .6s ease-out both}
.reveal.d1{animation-delay:.10s}.reveal.d2{animation-delay:.20s}.reveal.d3{animation-delay:.30s}

/* Abschnitts-Überschrift */
.sec-label{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.2px;font-family:'Oswald',sans-serif;margin:22px 4px 10px;display:flex;justify-content:space-between;align-items:center}

/* Blaue Gradient-Kachel (Objekt / Aktion) – Master-Stil */
.tile{width:100%;padding:14px 15px;border-radius:var(--radius-lg);border:1px solid transparent;cursor:pointer;
  background:var(--grad-blue);color:#fff;display:flex;align-items:center;gap:12px;text-align:left;
  box-shadow:0 6px 20px var(--sh-blue);transition:all .22s ease;margin-bottom:10px;font-family:inherit}
.tile:hover{transform:translateY(-2px);box-shadow:0 10px 28px var(--sh-blue)}
.tile:active{transform:translateY(1px) scale(.99)}
.tile .ic{width:30px;height:30px;flex:none}
.tile .ic svg{width:30px;height:30px;display:block}
.tile .txt{flex:1;min-width:0}
.tile .t{font-size:15px;font-weight:600;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tile .d{font-size:12px;opacity:.88;line-height:1.4;font-family:'Source Sans 3',sans-serif}
.tile .arrow{font-size:18px;opacity:.7;flex:none}
.tile .meta-r{font-size:11px;opacity:.85;font-family:'Oswald',sans-serif;text-align:right;flex:none;line-height:1.3}

/* Add-Kachel (Objekt anlegen) */
.tile.add{background:var(--bg-secondary);border:1.5px dashed var(--accent-blue);box-shadow:none;color:var(--accent-blue)}
.tile.add:hover{background:var(--bg-tertiary);transform:translateY(-2px)}
.tile.add .t{color:var(--accent-blue)}

/* Neutrale Nav-Kachel (Verwaltung/Module) */
.navtile{width:100%;padding:13px 15px;border-radius:var(--radius-md);border:1px solid var(--border-color);cursor:pointer;
  background:var(--bg-secondary);color:var(--text-primary);display:flex;align-items:center;gap:12px;text-align:left;transition:all .18s ease;margin-bottom:8px;font-family:inherit}
.navtile:hover{background:var(--bg-tertiary);border-color:var(--accent-blue)}
.navtile .ic{width:24px;height:24px;flex:none;color:var(--accent-blue)}
.navtile .ic svg{width:24px;height:24px;display:block}
.navtile .t{flex:1;font-size:14px;font-weight:600;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.5px}
.navtile .d{font-size:11px;color:var(--text-muted);font-family:'Source Sans 3',sans-serif}

/* Badges */
.badge{display:inline-flex;align-items:center;border-radius:16px;font-size:10px;font-weight:600;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.5px;padding:3px 9px}
.badge.soon{background:rgba(232,126,34,0.14);color:var(--accent-orange-light)}
.badge.ok{background:rgba(39,174,96,0.14);color:var(--success)}
.badge.art{background:rgba(77,166,255,0.14);color:var(--accent-blue)}
.badge.aktiv{background:rgba(39,174,96,0.14);color:var(--success)}

/* Karten / Panels */
.card{background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:var(--radius-lg);padding:18px;margin-bottom:14px}
.card h3{font-family:'Oswald',sans-serif;font-size:14px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text-primary);margin-bottom:12px}
.kv{display:flex;flex-direction:column;gap:9px}
.kv .row{display:flex;justify-content:space-between;gap:14px;font-size:13.5px;border-bottom:1px solid var(--border-color);padding-bottom:9px}
.kv .row:last-child{border-bottom:none;padding-bottom:0}
.kv .k{color:var(--text-muted);font-family:'Oswald',sans-serif;text-transform:uppercase;font-size:11px;letter-spacing:.5px;padding-top:2px}
.kv .v{color:var(--text-primary);text-align:right;font-family:'Source Sans 3',sans-serif}

/* Akte: Panel-Kopf mit Aktion rechts */
.panel-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
.panel-head h3{margin:0}

/* Einheit-Subkarte */
.einheit{background:var(--bg-primary);border:1px solid var(--border-color);border-radius:var(--radius-md);padding:13px 14px;margin-bottom:12px}
.einheit:last-child{margin-bottom:0}
.eh-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:4px}
.eh-top .eh-name{flex:1;min-width:0}
.eh-top .eh-name b{font-family:'Oswald',sans-serif;font-size:14px;font-weight:600;color:var(--text-primary);text-transform:uppercase;letter-spacing:.4px}
.eh-top .eh-name span{display:block;font-size:11px;color:var(--text-muted);margin-top:2px;font-family:'Source Sans 3',sans-serif}

/* Mietverhältnis-Zeile */
.mv{border-top:1px solid var(--border-color);padding:11px 0 4px;margin-top:8px}
.mv:first-of-type{border-top:1px dashed var(--border-color)}
.mv-top{display:flex;align-items:center;gap:8px}
.mv-top .mv-name{flex:1;min-width:0;font-family:'Oswald',sans-serif;font-size:13.5px;font-weight:600;color:var(--text-primary)}
.mv-zeit{font-size:11px;color:var(--text-muted);margin-top:2px;font-family:'Source Sans 3',sans-serif}
.mv-geld{display:flex;gap:14px;flex-wrap:wrap;margin-top:5px}
.mv-geld span{font-size:11px;color:var(--text-light);font-family:'Source Sans 3',sans-serif}
.mv-geld b{color:var(--text-white);font-family:'Oswald',sans-serif}
.mv-actions{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap}

/* Mini-Buttons in der Akte */
.mini{padding:6px 11px;border-radius:8px;font-family:'Oswald',sans-serif;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;border:1px solid var(--border-color);background:var(--bg-tertiary);color:var(--text-primary)}
.mini.blue{background:rgba(30,136,229,0.14);border-color:rgba(30,136,229,0.35);color:var(--accent-blue)}
.mini.red{background:rgba(196,30,30,0.12);border-color:rgba(196,30,30,0.3);color:var(--accent-red-light)}
.mini.grn{background:rgba(39,174,96,0.12);border-color:rgba(39,174,96,0.3);color:var(--success)}
.add-row{width:100%;padding:10px;border-radius:var(--radius-md);border:1.5px dashed var(--accent-blue);background:rgba(30,136,229,0.06);color:var(--accent-blue);font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
.add-row:hover{background:rgba(30,136,229,0.12)}
.leer-hint{font-size:12px;color:var(--text-muted);font-family:'Source Sans 3',sans-serif;padding:6px 0 10px}
.dok-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border-color)}
.dok-row:last-of-type{border-bottom:none}
.dok-row .di{flex:1;min-width:0}
.dok-row .di b{font-family:'Source Sans 3',sans-serif;font-size:13.5px;color:var(--text-primary);font-weight:600}
.dok-row .di span{display:block;font-size:11px;color:var(--text-muted);font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.4px}

/* Nebenkosten */
.nk-result{background:linear-gradient(135deg,var(--bg-tertiary),var(--bg-secondary));border:1px solid var(--accent-blue);border-radius:var(--radius-lg);padding:16px 18px;margin:14px 0;display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap}
.nk-result .big{font-family:'Oswald',sans-serif;font-size:30px;font-weight:700;line-height:1}
.nk-result .lbl{font-size:11px;color:var(--text-muted);font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.nk-result .sub{font-size:11px;color:var(--text-muted);font-family:'Source Sans 3',sans-serif;margin-top:4px}
.nk-nach{color:var(--accent-red-light)} .nk-erst{color:var(--success)}
.weg h4{font-family:'Oswald',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--accent-blue);margin:16px 0 6px}
.weg .ln{display:flex;justify-content:space-between;gap:12px;font-size:12.5px;padding:3px 0;font-family:'Source Sans 3',sans-serif;color:var(--text-light)}
.weg .ln b{color:var(--text-white);font-family:'Oswald',sans-serif;font-weight:600}
.weg .ln.tot{border-top:1px solid var(--border-color);margin-top:4px;padding-top:6px;color:var(--text-white)}
.weg .frm{font-size:11px;color:var(--text-muted);font-family:'Source Sans 3',sans-serif;margin:2px 0 4px}
.disc{font-size:11px;color:var(--text-muted);font-style:italic;font-family:'Source Sans 3',sans-serif;margin-top:14px;line-height:1.5;text-align:center}

/* Druck-Button (auf allen Modulseiten) */
#printFab{position:fixed;right:16px;bottom:18px;width:50px;height:50px;border-radius:50%;border:none;cursor:pointer;background:linear-gradient(135deg,#1E88E5,#1565C0);box-shadow:0 6px 18px rgba(30,136,229,.4);display:none;align-items:center;justify-content:center;z-index:50}
#printFab:hover{transform:translateY(-2px)}
.print-head{display:none}

/* Druckbild: helles, sauber ausdruckbares Layout (Tabellen inklusive) */
@media print{
  @page{margin:14mm}
  body{background:#fff!important}
  body::before{display:none!important}
  #printFab,.add-row,.mini,.btn,button,.overlay,.no-print{display:none!important}
  .page{max-width:100%!important;margin:0!important;padding:0!important}
  .kopf .logo{display:none!important}
  .print-head{display:block!important;font-family:'Oswald',sans-serif;font-weight:700;color:#111;border-bottom:2px solid #c41e1e;padding-bottom:6px;margin-bottom:14px;font-size:14px}
  .titel{color:#111!important}.label{color:#c41e1e!important}
  .card{background:#fff!important;border:1px solid #ccc!important;box-shadow:none!important;break-inside:avoid;color:#111!important}
  .card h3,.weg h4{color:#111!important;border-color:#ccc!important}
  .kv span,.dok-row .di span,.hint,.weg .ln,.disc,.nk-result .sub,.nk-result .lbl{color:#444!important}
  .kv b,.dok-row b,.weg .ln b,.nk-result .big{color:#111!important}
  .nk-result{background:#fff!important;border:1px solid #999!important}
  .nk-nach{color:#c41e1e!important}.nk-erst{color:#1b7a3d!important}
  .dok-row{border-color:#ddd!important;break-inside:avoid}
}

/* Hinweis-Box */
.notice{padding:14px 16px;border-radius:var(--radius-md);background:rgba(232,126,34,0.08);border:1px solid rgba(232,126,34,0.3);margin-bottom:14px}
.notice b{display:block;color:var(--accent-orange-light);font-family:'Oswald',sans-serif;font-size:13px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.notice p{font-size:13px;color:var(--text-light);line-height:1.5;font-family:'Source Sans 3',sans-serif}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-width:150px;padding:12px 26px;border-radius:var(--radius-md);border:none;cursor:pointer;
  font-family:'Oswald',sans-serif;font-size:14px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;transition:all .22s ease}
.btn svg{width:17px;height:17px}
.btn-red{background:var(--grad-red);color:#fff;box-shadow:0 4px 15px rgba(196,30,30,0.3)}
.btn-blue{background:var(--grad-blue);color:#fff;box-shadow:0 4px 15px var(--sh-blue)}
.btn-ghost{background:var(--bg-secondary);color:var(--text-primary);border:1px solid var(--border-color);box-shadow:none}
.btn-ghost:hover{background:var(--bg-tertiary)}
.btn:active{transform:translateY(1px) scale(.98)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-sm{min-width:0;padding:8px 14px;font-size:12px}
.center{text-align:center;margin-top:24px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

/* Empty-State */
.empty{text-align:center;padding:30px 18px;border:1px dashed var(--border-color);border-radius:var(--radius-lg);background:var(--bg-secondary)}
.empty .es-ic{font-size:34px;margin-bottom:8px}
.empty h3{font-family:'Oswald',sans-serif;font-size:16px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.empty p{font-size:13px;color:var(--text-muted);max-width:42ch;margin:0 auto 16px;line-height:1.5;font-family:'Source Sans 3',sans-serif}
.empty .es-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

/* Footer */
.foot{margin-top:32px;padding-top:16px;border-top:1px solid var(--border-color);text-align:center;font-size:11px;color:var(--text-muted);font-family:'Source Sans 3',sans-serif;line-height:1.7}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:9000;display:none;align-items:center;justify-content:center;padding:16px;overflow:auto}
.overlay.open{display:flex}
.modal{width:100%;max-width:460px;max-height:88vh;overflow-y:auto;background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius-lg);padding:20px;animation:fadeInUp .18s ease-out}
.modal-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.modal-h h2{font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-white)}
.modal-h .x{width:34px;height:34px;border-radius:8px;border:1px solid var(--border-color);background:var(--bg-tertiary);color:var(--text-primary);font-size:16px}
.modal p.q{font-size:14px;line-height:1.6;color:var(--text-light);font-family:'Source Sans 3',sans-serif}
.modal-f{display:flex;gap:10px;margin-top:18px}
.modal-f .btn{flex:1;min-width:0}

/* Felder */
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;color:var(--text-muted);font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;box-sizing:border-box;padding:10px 12px;border-radius:var(--radius-sm);border:1px solid var(--border-color);background:var(--bg-primary);color:var(--text-white);font-size:14px;font-family:'Source Sans 3',sans-serif;outline:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent-blue);box-shadow:0 0 0 3px rgba(30,136,229,0.12)}
.field textarea{resize:vertical;min-height:60px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.hint{font-size:11px;color:var(--text-muted);margin-top:4px;font-family:'Source Sans 3',sans-serif}
</style>
</head>
<body>
<div class="page" id="view"></div>
<button id="printFab" title="Diese Seite drucken" onclick="window.print()" aria-label="Drucken"><svg viewBox="0 0 32 32" width="22" height="22"><path d="M8 13V5h16v8" stroke="#fff" stroke-width="2" fill="none"/><rect x="4" y="13" width="24" height="10" rx="2" stroke="#fff" stroke-width="2" fill="none"/><rect x="9" y="18" width="14" height="9" stroke="#fff" stroke-width="1.6" fill="none"/></svg></button>

<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-h"><h2 id="mTitle">Titel</h2><button class="x" onclick="closeModal()" aria-label="Schließen">&#10005;</button></div>
    <div id="mBody"></div>
    <div class="modal-f" id="mFoot"></div>
  </div>
</div>
<input type="file" id="importFile" accept="application/json" style="display:none">

<script>
/* ============================================================
   THOMAS WILLWACHER HAUSVERWALTUNG · Ausbaustufe 1
   Design 1:1 nach TW Business Suite (Master-App): dunkel,
   Oswald + Source Sans 3, ModulWahl-Startseite mit Objektauswahl.
   Eine HTML-Datei, Vanilla JS, GitHub-Pages-fähig.
   ============================================================ */

/* ---------- Helfer ---------- */
const uid=()=>Math.random().toString(36).slice(2,9);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmtDate=d=>d?new Date(d).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'}):'\u2014';
const eur=n=>(Number(n)||0).toLocaleString('de-DE',{style:'currency',currency:'EUR'});

/* ============================================================
   PDF-BRIEFKOPF  ·  Single Source of Truth fuer ALLE PDFs
   1:1 aus der TW Business Suite (tw-pdf-briefkopf.js), nur auf

  try{ doc.addImage(PDF_LOGO,'JPEG',x,y,breite,h,undefined,'FAST'); }

function tw_drawBriefkopfHeader(doc){
  const P=TW_PDF, ML=P.MARGIN_L, MR=P.MARGIN_R, MT=P.MARGIN_T, rx=P.PAGE_W-MR;
  let y=MT;
  tw_drawLogoImage(doc,ML,y,P.LOGO_BREITE);
  doc.setFont('helvetica','normal'); doc.setFontSize(9);
  doc.setTextColor(...P.FARBE_TEXT_MID);
  doc.text(P.ADRESSE_1,rx,y+8,{align:'right'});
  doc.text(P.ADRESSE_2,rx,y+12,{align:'right'});
  doc.text(P.TEL,rx,y+16,{align:'right'});
  doc.text(P.MOBIL,rx,y+20,{align:'right'});
  y+=30;
  doc.setDrawColor(...P.FARBE_ROT); doc.setLineWidth(0.8); doc.line(ML,y,rx,y); y+=4;
  doc.setFont('helvetica','normal'); doc.setFontSize(6); doc.setTextColor(...P.FARBE_GRAU_KLEIN);
  doc.text(P.ABSENDER_LINE,ML,y); y+=6;
  return y;
}
function tw_drawBriefkopfFooter(doc,pageNum){
  const P=TW_PDF, PW=P.PAGE_W, PH=P.PAGE_H, ML=P.MARGIN_L, MR=P.MARGIN_R, MB=P.MARGIN_B, rx=PW-MR;
  const pn=pageNum==null?1:pageNum;
  doc.setDrawColor(...P.FARBE_ROT); doc.setLineWidth(0.5); doc.line(ML,PH-MB+2,rx,PH-MB+2);
  doc.setFontSize(7); doc.setFont('helvetica','bold'); doc.setTextColor(...P.FARBE_ROT);
  doc.text(P.FIRMA_NAME,ML,PH-MB+6);
  doc.setFont('helvetica','normal'); doc.setTextColor(...P.FARBE_GRAU_FOOTER);
  doc.text(P.STEUERNUMMER,rx,PH-MB+6,{align:'right'});
  doc.text(P.KONTAKTZEILE,ML,PH-MB+10);
  doc.text('Seite '+pn,rx,PH-MB+10,{align:'right'});
}
function tw_drawEmpfaengerBlock(doc,y,data){
  data=data||{}; const P=TW_PDF, ML=P.MARGIN_L, rx=P.PAGE_W-P.MARGIN_R, top=y;
  if(data.name){ doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.setTextColor(...P.FARBE_TEXT); doc.text(String(data.name),ML,y); y+=5; }
  doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(...P.FARBE_TEXT_MID);
  if(data.zusatz){ doc.text(String(data.zusatz),ML,y); y+=5; }
  if(data.strasse){ doc.text(String(data.strasse),ML,y); y+=5; }
  if(data.plzOrt){ doc.text(String(data.plzOrt),ML,y); y+=5; }
  if(data.datum){
    let t; try{ const d=(data.datum instanceof Date)?data.datum:new Date(data.datum); t=isNaN(d.getTime())?String(data.datum):d.toLocaleDateString('de-DE'); }catch(e){ t=String(data.datum); }
    doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(...P.FARBE_GRAU_LABEL); doc.text('Datum:',rx-30,top);
    doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(...P.FARBE_TEXT_DUNKEL); doc.text(t,rx,top,{align:'right'});
  }
  y=Math.max(y,top+20)+20; return y;
}

/* ---------- Persistenz (window.storage zuerst, localStorage als Fallback) ---------- */
const KEY='hv:data:v1';
const Store={
  async get(){
    try{ if(window.storage?.get){const r=await window.storage.get(KEY); return r?.value?JSON.parse(r.value):null;} }catch(e){}
    try{ const v=localStorage.getItem(KEY); return v?JSON.parse(v):null; }catch(e){ return null; }
  },
  async set(d){
    const s=JSON.stringify(d);
    try{ if(window.storage?.set){ await window.storage.set(KEY,s); return; } }catch(e){}
    try{ localStorage.setItem(KEY,s); }catch(e){}
  }
};

/* ---------- KPIs ---------- */
function kpis(){
  let einheiten=0,belegt=0,eigen=0;
  state.objekte.forEach(o=>{(o.einheiten||[]).forEach(e=>{
    einheiten++; const aktiv=(e.mietverhaeltnisse||[]).some(m=>!m.auszug);
    if(o.art==='eigen')eigen++; else if(aktiv)belegt++;
  });});
  return {objekte:state.objekte.length,einheiten,belegt,frei:Math.max(0,einheiten-belegt-eigen),eigen};
}

/* ---------- Routing ---------- */
function go(v,id){ view=v; selId=id||null; render(); window.scrollTo(0,0); }
function render(){
  const el=document.getElementById('view');
  if(view==='home') el.innerHTML=renderHome();
  else if(view==='detail') el.innerHTML=renderDetail();
  else if(view==='stamm') el.innerHTML=renderStamm();
  else if(view==='nk') el.innerHTML=renderNk();
  else if(view==='weg') el.innerHTML=renderWeg();
  else if(view==='kasse') el.innerHTML=renderKasse();
  else el.innerHTML=renderSoon(view);
  const fab=document.getElementById('printFab'); if(fab) fab.style.display=(view==='home')?'none':'flex';
}

/* ============================================================
   NEBENKOSTENABRECHNUNG  ·  Stufe 3
   Rechenlogik 1:1 aus der Excel-Vorlage (HeizkostenV/BetrKV).
   Geführte Maske, Live-Saldo, transparenter Rechenweg, PDF.
   ============================================================ */
let nkObjId=null, nkJahr=null, nkEinheitId=null, nkWork=null, nkLoadedKey=null, nkWegOpen=false;

function nkEnsure(o){
  const key=o.id+'|'+nkJahr;
  if(nkLoadedKey===key && nkWork) return;
  const saved=(o.nk&&o.nk[nkJahr])?JSON.parse(JSON.stringify(o.nk[nkJahr])):null;
  if(saved){ nkWork=saved; nkWork.mieter=nkWork.mieter||{}; nkWork.gesamt=nkWork.gesamt||{}; }
  else{
    const gflaeche=o.gesamtwohnflaeche||(o.einheiten||[]).reduce((s,e)=>s+(Number(e.wohnflaeche)||0),0);
    nkWork={ datum:new Date().toISOString().slice(0,10), splitVerbrauch:70,
      gesamt:{we:'',ww:'',wasser:'',oel:'',heizanlage:'',zusatzWW:'',zusatzHeiz:'',wasserkosten:'',hausGarten:'',tv:'',strom:'',feuerv:'',anzahlEinheiten:((o.einheiten||[]).length||1),gesamtflaeche:gflaeche||''},
      mieter:{} };
  }
  (o.einheiten||[]).forEach(e=>{
    if(!nkWork.mieter[e.id]){
      const akt=(e.mietverhaeltnisse||[]).find(m=>!m.auszug);
      nkWork.mieter[e.id]={ name:akt?akt.mieter:(e.bezeichnung||''), flaeche:(e.wohnflaeche||''), we:'',ww:'',wasser:'',abschlaege:(akt&&akt.nkVoraus?akt.nkVoraus*12:''),muell:'',grundsteuer:'' };
    }
  });
  nkLoadedKey=key;
}
function nkSet(group,key,val){
  if(!nkWork) return;
  if(group==='split') nkWork.splitVerbrauch=val;
  else if(group==='datum') nkWork.datum=val;
  else if(group==='gesamt') nkWork.gesamt[key]=val;
  else if(group==='mieter'){ if(!nkWork.mieter[nkEinheitId]) nkWork.mieter[nkEinheitId]={}; nkWork.mieter[nkEinheitId][key]=val; }
  nkRecalc();
}
function nkNum(v){ const x=parseFloat(String(v==null?'':v).replace(/\./g,'').replace(',','.')); return isNaN(x)?(function(){const y=parseFloat(String(v).replace(',','.'));return isNaN(y)?0:y;})():x; }
function nkCompute(w,eid){
  const n=v=>{ const x=parseFloat(String(v==null?'':v).replace(',','.')); return isNaN(x)?0:x; };
  const G=w.gesamt||{}, m=(w.mieter&&w.mieter[eid])||{};
  const verbr=Math.min(70,Math.max(50,n(w.splitVerbrauch||70)))/100, grund=1-verbr;
  const WE_gesamt=n(G.we), WW_gesamt=n(G.ww), Wasser_gesamt=n(G.wasser), Oel=n(G.oel);
  const SummeHeiz=n(G.heizanlage), ZWW=n(G.zusatzWW), ZHeiz=n(G.zusatzHeiz);
  const Wasserkosten=n(G.wasserkosten), HausGarten=n(G.hausGarten), TV=n(G.tv), Strom=n(G.strom), Feuerv=n(G.feuerv);
  const AnzEinh=n(G.anzahlEinheiten)||1, GesFlaeche=n(G.gesamtflaeche)||1;
  const LiterOelWW=(2.5*WW_gesamt*(60-10))/10;
  const AnteilWW=Oel>0?(100/Oel*LiterOelWW):0;
  const WWenergie=SummeHeiz*(AnteilWW/100);
  const Warmwasserkosten=WWenergie+ZWW;
  const Heizkosten=SummeHeiz-WWenergie+ZHeiz;
  const WWg=Warmwasserkosten*grund, WWv=Warmwasserkosten*verbr, Hg=Heizkosten*grund, Hv=Heizkosten*verbr;
  const EW_Hg=GesFlaeche>0?Hg/GesFlaeche:0, EW_Hv=WE_gesamt>0?Hv/WE_gesamt:0, EW_WWg=GesFlaeche>0?WWg/GesFlaeche:0, EW_WWv=WW_gesamt>0?WWv/WW_gesamt:0;
  const mFl=n(m.flaeche), mWE=n(m.we), mWW=n(m.ww), mWas=n(m.wasser), mAbschl=n(m.abschlaege), mMuell=n(m.muell), mGrund=n(m.grundsteuer);
  const m_Hg=mFl*EW_Hg, m_Hv=mWE*EW_Hv, m_WWg=mFl*EW_WWg, m_WWv=mWW*EW_WWv;
  const KostenHeizWW=m_Hg+m_Hv+m_WWg+m_WWv;
  const EW_Feuerv=GesFlaeche>0?Feuerv/GesFlaeche:0, EW_HausGart=AnzEinh>0?HausGarten/AnzEinh:0, EW_Wasser=Wasser_gesamt>0?Wasserkosten/Wasser_gesamt:0, EW_Strom=AnzEinh>0?Strom/AnzEinh:0, EW_TV=AnzEinh>0?TV/AnzEinh:0;
  const m_Feuerv=mFl*EW_Feuerv, m_HausGart=EW_HausGart, m_Wasser=mWas*EW_Wasser, m_Strom=EW_Strom, m_TV=EW_TV;
  const KostenHausneben=m_Feuerv+m_HausGart+m_Wasser+m_Strom+m_TV+mMuell+mGrund;
  const Gesamt=KostenHeizWW+KostenHausneben, Saldo=Gesamt-mAbschl;
  let datum; try{ datum=w.datum?new Date(w.datum):new Date(); if(isNaN(datum.getTime()))datum=new Date(); }catch(e){ datum=new Date(); }
  const tage=Math.max(0,Math.round((datum-new Date(datum.getFullYear(),0,1))/86400000));
  const Nachzahlung=Math.max(Saldo,0), Tagesanteil=Nachzahlung/365*tage, SummeNeu=Tagesanteil+Nachzahlung, NeuAbschlag=(SummeNeu/12)+(mAbschl/12);
  return {verbr,grund,LiterOelWW,AnteilWW,WWenergie,Warmwasserkosten,Heizkosten,WWg,WWv,Hg,Hv,EW_Hg,EW_Hv,EW_WWg,EW_WWv,
    m_Hg,m_Hv,m_WWg,m_WWv,KostenHeizWW,m_Feuerv,m_HausGart,m_Wasser,m_Strom,m_TV,mMuell,mGrund,KostenHausneben,
    Gesamt,mAbschl,Saldo,tage,Nachzahlung,Tagesanteil,SummeNeu,NeuAbschlag,
    inputs:{WW_gesamt,Oel,SummeHeiz,ZWW,ZHeiz,mFl,mWE,mWW,mWas}};
}

/* ============================================================
   KASSE  ·  Einnahmen, Forderungen, Mahnungen
   Bucht Miete/Kaution/NK/Sonstiges, zeigt Soll/Ist-Fehlbetraege,
   erstellt Mahnungen (PDF/Mail/Druck) mit direkter Personen-/
   Wohnungs-Uebernahme. Kassenbuch als PDF im Briefkopf.
   ============================================================ */
const KASSE_ART={miete:'Miete',kaution:'Kaution',nk:'NK-Nachzahlung',sonstige:'Sonstige Einnahme',ausgabe:'Ausgabe'};
let kasseObjFilter='', kasseJahr=null;
function kasseEnsure(){ state.kasse=state.kasse||{buchungen:[]}; }

/* Personen-/Wohnungs-Uebernahme: zentral fuer Formulare & Mahnungen */
function empfaengerFromEinheit(o,einheitId){
  const e=(o.einheiten||[]).find(x=>x.id===einheitId);
  const akt=e&&(e.mietverhaeltnisse||[]).find(m=>!m.auszug);
  const adr=[o.strasse,[o.plz,o.ort].filter(Boolean).join(' ')].filter(Boolean).join(', ');
  return { name:(akt&&akt.mieter)||'', einheit:e?e.bezeichnung:'', adresse:adr, email:(akt&&akt.email)||'' };
}
function monthsActiveInYear(mv,Y){
  const j1=new Date(Y,0,1), d31=new Date(Y,11,31);
  let s=mv.einzug?new Date(mv.einzug):j1; if(s<j1)s=j1;
  let e=mv.auszug?new Date(mv.auszug):d31; if(e>d31)e=d31;
  if(isNaN(s.getTime())||isNaN(e.getTime())||s>e) return 0;
  return Math.max(0,Math.min(12,(e.getFullYear()-s.getFullYear())*12+(e.getMonth()-s.getMonth())+1));
}
function kasseSollIst(objFilter,Y){
  kasseEnsure(); const rows=[];
  state.objekte.filter(o=>!objFilter||o.id===objFilter).forEach(o=>{
    (o.einheiten||[]).forEach(e=>{
      let soll=0; (e.mietverhaeltnisse||[]).forEach(mv=>{ const mm=monthsActiveInYear(mv,Y); if(mm>0) soll+=((Number(mv.kaltmiete)||0)+(Number(mv.nkVoraus)||0))*mm; });
      const akt=(e.mietverhaeltnisse||[]).find(m=>!m.auszug); const mieter=akt?akt.mieter:(((e.mietverhaeltnisse||[])[0]||{}).mieter||'');
      const ist=(state.kasse.buchungen||[]).filter(b=>b.art==='miete'&&b.einheitId===e.id&&b.datum&&new Date(b.datum).getFullYear()===Y).reduce((s,b)=>s+(Number(b.betrag)||0),0);
      if(soll>0||ist>0) rows.push({objektId:o.id,einheitId:e.id,einheit:e.bezeichnung,objekt:o.bezeichnung,mieter,soll,ist,fehl:Math.max(0,soll-ist)});
    });
  });
  return rows;
}

function kasseSetJahr(v){ const j=(v||'').trim(); if(j) kasseJahr=j; render(); }

  const Y=parseInt(kasseJahr)||new Date().getFullYear();
  const objOpts='<option value="">Alle Objekte</option>'+state.objekte.map(o=>'<option value="'+o.id+'"'+(kasseObjFilter===o.id?' selected':'')+'>'+esc(o.bezeichnung)+'</option>').join('');

  bu=[...bu].sort((a,b)=>String(b.datum||'').localeCompare(String(a.datum||'')));
  const einnahmen=bu.filter(b=>b.art!=='ausgabe').reduce((s,b)=>s+(Number(b.betrag)||0),0);
  const ausgaben=bu.filter(b=>b.art==='ausgabe').reduce((s,b)=>s+(Number(b.betrag)||0),0);
  const sollIst=kasseSollIst(kasseObjFilter,Y);
  const offen=sollIst.reduce((s,r)=>s+r.fehl,0);

  const strip='<div class="nk-result reveal d1"><div><div class="lbl">Einnahmen '+Y+'</div><div class="big nk-erst">'+eur(einnahmen)+'</div>'+(ausgaben>0?'<div class="sub">abz. Ausgaben '+eur(ausgaben)+'</div>':'')+'</div>'
    +'<div style="text-align:right"><div class="lbl">Offene Forderungen</div><div class="big '+(offen>0?'nk-nach':'nk-erst')+'">'+eur(offen)+'</div><div class="sub">Soll vs. Ist (Miete)</div></div></div>';
  const byType=Object.keys(KASSE_ART).filter(k=>k!=='ausgabe').map(k=>{ const v=bu.filter(b=>b.art===k).reduce((s,b)=>s+(Number(b.betrag)||0),0); return v>0?nkLn(KASSE_ART[k],eur(v)):''; }).join('');
  const byCard=(byType||ausgaben>0)?'<div class="card weg reveal d1"><h3>Einnahmen nach Art</h3>'+byType+(ausgaben>0?nkLn('Ausgaben','\u2212 '+eur(ausgaben),true):'')+'</div>':'';

  const siRows=sollIst.map(r=>'<div class="dok-row"><div class="di"><b>'+esc(r.einheit)+(r.mieter?' \u00b7 '+esc(r.mieter):'')+'</b><span>Soll '+eur(r.soll)+' \u00b7 Ist '+eur(r.ist)+'</span></div>'
    +'<span style="font-family:Oswald,sans-serif;font-weight:700;color:'+(r.fehl>0?'var(--accent-red-light)':'var(--success)')+'">'+(r.fehl>0?eur(r.fehl):'\u2713')+'</span>'
    +(r.fehl>0?'<button class="mini" onclick="openMahnungModal(\''+r.objektId+'\',\''+r.einheitId+'\','+r.fehl.toFixed(2)+','+Y+')">Mahnung</button>':'')+'</div>').join('');
  const siCard='<div class="card reveal d2"><div class="panel-head"><h3>Soll / Ist je Einheit \u00b7 '+Y+'</h3></div>'+(siRows||'<div class="leer-hint">Keine Mietverh\u00e4ltnisse im Zeitraum.</div>')+'</div>';

  const liste=bu.length?bu.map(b=>{ const o=_o(b.objektId); const ein=b.art!=='ausgabe';
    return '<div class="dok-row"><div class="di"><b>'+KASSE_ART[b.art]+(b.person?' \u00b7 '+esc(b.person):'')+'</b><span>'+fmtDate(b.datum)+(o?' \u00b7 '+esc(o.bezeichnung):'')+(b.zweck?' \u00b7 '+esc(b.zweck):'')+'</span></div>'
    +'<span style="font-family:Oswald,sans-serif;font-weight:700;color:'+(ein?'var(--success)':'var(--accent-red-light)')+'">'+(ein?'+ ':'\u2212 ')+eur(b.betrag)+'</span>'
    +'<button class="mini" onclick="openBuchungModal(\''+b.id+'\')">Bearb.</button><button class="mini red" onclick="deleteBuchung(\''+b.id+'\')">Entf.</button></div>';
  }).join(''):'<div class="leer-hint">Noch keine Buchungen.</div>';
  const listCard='<div class="card reveal d2"><div class="panel-head"><h3>Buchungen \u00b7 '+Y+'</h3></div>'+liste
    +'<button class="add-row" onclick="openBuchungModal()">+ Buchung erfassen</button>'
    +'<button class="add-row" onclick="kassenbuchPdf()">Kassenbuch als PDF</button></div>';

  const disc='<div class="disc reveal">Soll = vertragliche Miete (kalt + NK-Voraus.) \u00d7 aktive Monate. Ist = gebuchte Mietzahlungen. Informationswerkzeug, keine Buchhaltung im Sinne der GoBD.</div>';
  return kopf('Kasse','Einnahmen & Forderungen',0.55)+filt+strip+byCard+siCard+listCard+disc+back;
}

/* Buchung erfassen/bearbeiten — mit Objekt -> Einheit -> Mieter-Uebernahme */
function openBuchungModal(bId){
  kasseEnsure();
  const b=bId?state.kasse.buchungen.find(x=>x.id===bId):null;
  const today=new Date().toISOString().slice(0,10);
  const objOpts='<option value="">\u2013</option>'+state.objekte.map(o=>'<option value="'+o.id+'"'+((b&&b.objektId===o.id)?' selected':'')+'>'+esc(o.bezeichnung)+'</option>').join('');
  const artOpts=Object.keys(KASSE_ART).map(k=>'<option value="'+k+'"'+((b&&b.art===k)?' selected':'')+'>'+KASSE_ART[k]+'</option>').join('');
  document.getElementById('mTitle').textContent=bId?'Buchung bearbeiten':'Buchung erfassen';
  document.getElementById('mBody').innerHTML=
     '<div class="row2"><div class="field"><label>Art</label><select id="k_art">'+artOpts+'</select></div><div class="field"><label>Datum</label><input id="k_datum" type="date" value="'+(b?b.datum:today)+'"></div></div>'
    +'<div class="field"><label>Betrag (\u20ac)</label><input id="k_betrag" type="text" inputmode="decimal" value="'+(b?esc(String(b.betrag)):'')+'" placeholder="0,00"></div>'
    +'<div class="field"><label>Objekt</label><select id="k_obj" onchange="kasseObjChange()">'+objOpts+'</select></div>'
    +'<div class="field"><label>Einheit / Wohnung</label><select id="k_einheit" onchange="kasseEinheitChange()"></select></div>'
    +'<div class="field"><label>Person / Mieter</label><input id="k_person" value="'+(b?esc(b.person||''):'')+'" placeholder="wird aus Mietverh\u00e4ltnis \u00fcbernommen"></div>'
    +'<div class="field"><label>Zweck / Notiz</label><input id="k_zweck" value="'+(b?esc(b.zweck||''):'')+'" placeholder="z. B. Miete April '+(new Date().getFullYear())+'"></div>';
  document.getElementById('mFoot').innerHTML='<button class="btn btn-red" onclick="closeModal()">Abbrechen</button><button class="btn btn-blue" onclick="saveBuchung(\''+(bId||'')+'\')">Speichern</button>';
  openModal();
  kasseObjChange(b?b.einheitId:null,b?b.person:null);
  setTimeout(()=>{const f=document.getElementById('k_betrag'); if(f)f.focus();},60);
}
function kasseObjChange(preEinheitId,prePerson){
  const objSel=document.getElementById('k_obj'); if(!objSel)return;
  const o=_o(objSel.value), eSel=document.getElementById('k_einheit'); const eh=(o&&o.einheiten)||[];
  eSel.innerHTML='<option value="">\u2013 keine \u2013</option>'+eh.map(e=>'<option value="'+e.id+'"'+(preEinheitId===e.id?' selected':'')+'>'+esc(e.bezeichnung)+'</option>').join('');
  kasseEinheitChange(typeof prePerson==='string'?prePerson:undefined);
}
function kasseEinheitChange(prePerson){
  const objSel=document.getElementById('k_obj'), eSel=document.getElementById('k_einheit'), pIn=document.getElementById('k_person');
  if(!objSel||!eSel||!pIn)return;
  if(typeof prePerson==='string'){ if(prePerson) pIn.value=prePerson; return; }
  const o=_o(objSel.value), e=o&&(o.einheiten||[]).find(x=>x.id===eSel.value);
  const akt=e&&(e.mietverhaeltnisse||[]).find(m=>!m.auszug);
  if(akt) pIn.value=akt.mieter||'';
}
function saveBuchung(bId){
  kasseEnsure(); const g=x=>document.getElementById(x);
  const betrag=parseFloat(String(g('k_betrag').value).replace(',','.'))||0;
  if(betrag<=0){ g('k_betrag').focus(); g('k_betrag').style.borderColor='var(--accent-red)'; return; }
  const data={datum:g('k_datum').value||null,art:g('k_art').value,betrag,objektId:g('k_obj').value||null,einheitId:g('k_einheit').value||null,person:g('k_person').value.trim(),zweck:g('k_zweck').value.trim()};
  if(bId){ Object.assign(state.kasse.buchungen.find(x=>x.id===bId),data); }
  else{ state.kasse.buchungen.push({id:uid(),...data}); }
  save(); closeModal(); render();
}
function deleteBuchung(bId){ kasseEnsure(); state.kasse.buchungen=state.kasse.buchungen.filter(x=>x.id!==bId); save(); render(); }

    +'<div class="field"><label>Betreff</label><input id="ma_betr" value="'+esc(betr)+'"></div>'
    +'<div class="field"><label>Text</label><textarea id="ma_text" style="min-height:180px">'+esc(text)+'</textarea></div>'

function mahnungMail(){
  const g=x=>document.getElementById(x);
  window.location.href='mailto:'+encodeURIComponent(g('ma_email').value.trim())+'?subject='+encodeURIComponent(g('ma_betr').value)+'&body='+encodeURIComponent(g('ma_text').value);

function mahnungPdf(mode){
  if(!pdfReady()){ alert('PDF-Bibliothek wird noch geladen \u2013 bitte gleich erneut.'); return; }
  const g=x=>document.getElementById(x);
  const o=_o(g('ma_obj').value), emp=empfaengerFromEinheit(o,g('ma_eh').value);
  const {jsPDF}=window.jspdf, doc=new jsPDF('p','mm','a4');
  const P=TW_PDF, ML=P.MARGIN_L, rx=P.PAGE_W-P.MARGIN_R;
  let y=tw_drawBriefkopfHeader(doc);
  y=tw_drawEmpfaengerBlock(doc,y,{name:g('ma_name').value,zusatz:(emp.einheit||'')+(emp.adresse?' \u00b7 '+emp.adresse:''),datum:new Date()});
  doc.setFont('helvetica','bold'); doc.setFontSize(12); doc.setTextColor(17,17,17); doc.text(g('ma_betr').value,ML,y); y+=8;
  doc.setFont('helvetica','normal'); doc.setFontSize(10.5); doc.setTextColor(40,40,40);
  doc.text(doc.splitTextToSize(g('ma_text').value.replace(/\r/g,''),rx-ML),ML,y);

  if(mode==='print'){ try{ window.open(doc.output('bloburl'),'_blank'); }catch(e){ doc.save('Mahnung.pdf'); } }
  else doc.save('Mahnung_'+String(g('ma_name').value||'Mieter').replace(/[^a-zA-Z0-9 _-]/g,'').trim().replace(/ +/g,'_')+'.pdf');

/* PDF: Kassenbuch */
function kassenbuchPdf(){
  if(!pdfReady()){ alert('PDF-Bibliothek wird noch geladen \u2013 bitte gleich erneut.'); return; }
  kasseEnsure();
  const Y=parseInt(kasseJahr)||new Date().getFullYear();
  const {jsPDF}=window.jspdf, doc=new jsPDF('p','mm','a4');
  const P=TW_PDF, ML=P.MARGIN_L, MR=P.MARGIN_R, MB=P.MARGIN_B, rx=P.PAGE_W-MR;
  const foot=()=>tw_drawBriefkopfFooter(doc,doc.internal.getNumberOfPages());
  const E=v=>eur(v).replace(/\u00a0/g,' ');
  let bu=(state.kasse.buchungen||[]).filter(b=>(!kasseObjFilter||b.objektId===kasseObjFilter)&&(!b.datum||new Date(b.datum).getFullYear()===Y));
  bu=[...bu].sort((a,b)=>String(a.datum||'').localeCompare(String(b.datum||'')));
  let y=tw_drawBriefkopfHeader(doc);
  doc.setFont('helvetica','bold'); doc.setFontSize(15); doc.setTextColor(17,17,17); doc.text('Kassenbuch '+Y,ML,y+2);
  doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(136,136,136);
  doc.text((kasseObjFilter&&_o(kasseObjFilter)?_o(kasseObjFilter).bezeichnung:'Alle Objekte'),rx,y+2,{align:'right'}); y+=11;
  let rows=bu.map(b=>{ const o=_o(b.objektId); const ein=b.art!=='ausgabe'; return [fmtDate(b.datum),KASSE_ART[b.art],o?o.bezeichnung:'',b.person||'',b.zweck||'',(ein?'+ ':'- ')+E(b.betrag)]; });
  if(rows.length===0) rows=[[{content:'Keine Buchungen im Zeitraum.',colSpan:6,styles:{textColor:[136,136,136],fontStyle:'italic'}}]];
  const einnahmen=bu.filter(b=>b.art!=='ausgabe').reduce((s,b)=>s+(Number(b.betrag)||0),0);
  const ausgaben=bu.filter(b=>b.art==='ausgabe').reduce((s,b)=>s+(Number(b.betrag)||0),0);
  const footRows=[[{content:'Summe Einnahmen',colSpan:5,styles:{halign:'right',fontStyle:'bold'}},{content:E(einnahmen),styles:{halign:'right',fontStyle:'bold'}}]];
  if(ausgaben>0){ footRows.push([{content:'Summe Ausgaben',colSpan:5,styles:{halign:'right'}},{content:'- '+E(ausgaben),styles:{halign:'right'}}]);
    footRows.push([{content:'Netto',colSpan:5,styles:{halign:'right',fontStyle:'bold'}},{content:E(einnahmen-ausgaben),styles:{halign:'right',fontStyle:'bold'}}]); }
  doc.autoTable({ startY:y, margin:{left:ML,right:MR,bottom:MB+8},
    head:[['Datum','Art','Objekt','Person','Zweck','Betrag']], body:rows, theme:'grid', showHead:'everyPage',
    styles:{font:'helvetica',fontSize:8,textColor:[34,34,34],cellPadding:{top:1.8,bottom:1.8,left:2,right:2},lineColor:[224,224,224],lineWidth:0.15,overflow:'linebreak'},
    headStyles:{fillColor:[196,30,30],textColor:[255,255,255],fontStyle:'bold',fontSize:8},
    columnStyles:{0:{cellWidth:20},1:{cellWidth:26},2:{cellWidth:'auto'},3:{cellWidth:28},4:{cellWidth:'auto'},5:{cellWidth:26,halign:'right'}},
    foot:footRows, footStyles:{fillColor:[240,240,240],textColor:[17,17,17],fontSize:8.5}, didDrawPage:foot });
  doc.save('Kassenbuch_'+Y+(kasseObjFilter?'_gefiltert':'')+'.pdf');
}

/* ============================================================
   EIGENTUM & RÜCKLAGEN (WEG)  ·  Stufe 4
   Erhaltungsrücklage (§ 19 WEG) mit Bewegungsliste, MEA/Hausgeld,
   Beschluss-Sammlung, Sonderumlagen, Kontoauszug-PDF im Briefkopf.
   ============================================================ */
let wegObjId=null;
function ruecklageStand(o){ const b=(o.ruecklage&&o.ruecklage.bewegungen)||[]; return b.reduce((s,x)=>s+(x.art==='entnahme'?-1:1)*(Number(x.betrag)||0),0); }
function wegPick(v){ wegObjId=v; selId=null; render(); }
function wegSet(objId,key,val){ const o=_o(objId); if(!o)return; if(key==='mea')o.mea=val; else if(key==='hausgeld')o.hausgeld=val; o.geaendert=Date.now(); save(); }

function renderWeg(){
  const back='<div class="center reveal"><button class="btn btn-red" onclick="go(\'home\')">\u2190 Zur\u00fcck</button></div>';
  const wegList=state.objekte.filter(o=>o.art==='weg');
  if(wegList.length===0)
    return kopf('Eigentum & R\u00fccklagen','WEG',0.55)
      +'<div class="empty reveal"><div class="es-ic">\uD83C\uDFDB\uFE0F</div><h3>Kein WEG-Objekt</h3><p>Legen Sie ein Objekt der Art \u201eWEG-Eigentum\u201c an \u2013 dann verwalten Sie hier Erhaltungsr\u00fccklage, Hausgeld, Beschl\u00fcsse und Sonderumlagen.</p><div class="es-actions"><button class="btn btn-blue btn-sm" onclick="openObjektModal()">WEG-Objekt anlegen</button></div></div>'+back;
  if(selId && _o(selId) && _o(selId).art==='weg') wegObjId=selId;
  if(!wegObjId||!wegList.find(o=>o.id===wegObjId)) wegObjId=wegList[0].id;
  const o=_o(wegObjId);
  o.ruecklage=o.ruecklage||{stand:0,bewegungen:[]}; o.beschluesse=o.beschluesse||[]; o.sonderumlagen=o.sonderumlagen||[];
  const stand=ruecklageStand(o);
  const bew=[...(o.ruecklage.bewegungen||[])].sort((a,b)=>String(b.datum||'').localeCompare(String(a.datum||'')));

  const objField = wegList.length>1
    ? '<div class="card reveal"><div class="field" style="margin:0"><label>WEG-Objekt</label><select onchange="wegPick(this.value)">'+wegList.map(x=>'<option value="'+x.id+'"'+(x.id===wegObjId?' selected':'')+'>'+esc(x.bezeichnung)+'</option>').join('')+'</select></div></div>'
    : '';

  let bewHtml = bew.length ? bew.map(x=>{
      const ein=x.art!=='entnahme';
      return '<div class="dok-row"><div class="di"><b>'+esc(x.zweck||(ein?'Zuf\u00fchrung':'Entnahme'))+'</b><span>'+fmtDate(x.datum)+' \u00b7 '+(ein?'Zuf\u00fchrung':'Entnahme')+'</span></div>'
        +'<span style="font-family:Oswald,sans-serif;font-weight:700;color:'+(ein?'var(--success)':'var(--accent-red-light)')+'">'+(ein?'+ ':'\u2212 ')+eur(x.betrag)+'</span>'
        +'<button class="mini" onclick="openBewegungModal(\''+o.id+'\',\''+(ein?'zufuehrung':'entnahme')+'\',\''+x.id+'\')">Bearb.</button>'
        +'<button class="mini red" onclick="deleteBewegung(\''+o.id+'\',\''+x.id+'\')">Entf.</button></div>';
    }).join('') : '<div class="leer-hint">Noch keine Bewegungen.</div>';

  const rkCard='<div class="card reveal d1"><div class="panel-head"><h3>Erhaltungsr\u00fccklage (\u00a7 19 WEG)</h3></div>'
    +'<div class="nk-result" style="border-color:var(--success)"><div><div class="lbl">Aktueller Stand</div><div class="big nk-erst">'+eur(stand)+'</div></div>'
    +'<div style="display:flex;gap:8px;flex-wrap:wrap"><button class="mini grn" onclick="openBewegungModal(\''+o.id+'\',\'zufuehrung\')">+ Zuf\u00fchrung</button><button class="mini red" onclick="openBewegungModal(\''+o.id+'\',\'entnahme\')">\u2212 Entnahme</button></div></div>'
    +bewHtml
    +'<button class="add-row" onclick="ruecklagePdf(\''+o.id+'\')">Kontoauszug als PDF</button></div>';

  const eck='<div class="card reveal d1"><h3>Eckdaten</h3>'
    +'<div class="row2"><div class="field"><label>Miteigentumsanteil (MEA)</label><input type="text" value="'+(o.mea!=null?esc(String(o.mea)):'')+'" placeholder="z. B. 250/1000" oninput="wegSet(\''+o.id+'\',\'mea\',this.value)"></div>'
    +'<div class="field"><label>Hausgeld (\u20ac/Monat)</label><input type="text" inputmode="decimal" value="'+(o.hausgeld!=null?esc(String(o.hausgeld)):'')+'" placeholder="0,00" oninput="wegSet(\''+o.id+'\',\'hausgeld\',this.value)"></div></div>'
    +'<p class="hint">MEA dient als Verteilerschl\u00fcssel; Hausgeld ist die monatliche Vorauszahlung an die Gemeinschaft.</p></div>';

  let beHtml = o.beschluesse.length ? [...o.beschluesse].sort((a,b)=>String(b.datum||'').localeCompare(String(a.datum||''))).map(x=>'<div class="dok-row"><div class="di"><b>'+esc(x.titel)+'</b><span>'+fmtDate(x.datum)+(x.text?' \u00b7 '+esc(x.text):'')+'</span></div><button class="mini red" onclick="deleteBeschluss(\''+o.id+'\',\''+x.id+'\')">Entf.</button></div>').join('') : '<div class="leer-hint">Noch keine Beschl\u00fcsse erfasst.</div>';
  const beCard='<div class="card reveal d2"><div class="panel-head"><h3>Beschl\u00fcsse & Protokolle</h3></div>'+beHtml+'<button class="add-row" onclick="openBeschlussModal(\''+o.id+'\')">+ Beschluss erfassen</button></div>';

  let suHtml = o.sonderumlagen.length ? [...o.sonderumlagen].sort((a,b)=>String(b.datum||'').localeCompare(String(a.datum||''))).map(x=>'<div class="dok-row"><div class="di"><b>'+esc(x.zweck)+'</b><span>'+fmtDate(x.datum)+'</span></div><span style="font-family:Oswald,sans-serif;font-weight:700;color:var(--text-white)">'+eur(x.betrag)+'</span><button class="mini red" onclick="deleteSonderumlage(\''+o.id+'\',\''+x.id+'\')">Entf.</button></div>').join('') : '<div class="leer-hint">Keine Sonderumlagen.</div>';
  const suCard='<div class="card reveal d2"><div class="panel-head"><h3>Sonderumlagen</h3></div>'+suHtml+'<button class="add-row" onclick="openSonderumlageModal(\''+o.id+'\')">+ Sonderumlage</button></div>';

  return kopf('Eigentum & R\u00fccklagen','WEG',0.55)+objField+rkCard+eck+beCard+suCard+back;
}

/* Bewegung (Zuführung/Entnahme) */
function openBewegungModal(objId,art,bId){
  const o=_o(objId); o.ruecklage=o.ruecklage||{stand:0,bewegungen:[]};
  const b=bId?(o.ruecklage.bewegungen||[]).find(x=>x.id===bId):null;
  const ein=art!=='entnahme', today=new Date().toISOString().slice(0,10);
  document.getElementById('mTitle').textContent=ein?'Zuf\u00fchrung zur R\u00fccklage':'Entnahme aus R\u00fccklage';
  document.getElementById('mBody').innerHTML=
     '<div class="field"><label>Datum</label><input id="b_datum" type="date" value="'+(b?b.datum:today)+'"></div>'
    +'<div class="field"><label>Betrag (\u20ac)</label><input id="b_betrag" type="text" inputmode="decimal" value="'+(b?esc(String(b.betrag)):'')+'" placeholder="250,00"></div>'
    +'<div class="field"><label>Zweck</label><input id="b_zweck" value="'+(b?esc(b.zweck):'')+'" placeholder="'+(ein?'monatliche Zuf\u00fchrung':'Reparatur Dach')+'"></div>';
  document.getElementById('mFoot').innerHTML='<button class="btn btn-red" onclick="closeModal()">Abbrechen</button><button class="btn btn-blue" onclick="saveBewegung(\''+objId+'\',\''+(ein?'zufuehrung':'entnahme')+'\',\''+(bId||'')+'\')">Speichern</button>';
  openModal(); setTimeout(()=>{const f=document.getElementById('b_betrag'); if(f)f.focus();},60);
}
function saveBewegung(objId,art,bId){
  const o=_o(objId), g=x=>document.getElementById(x);
  const betrag=parseFloat(String(g('b_betrag').value).replace(',','.'))||0;
  if(betrag<=0){ g('b_betrag').focus(); g('b_betrag').style.borderColor='var(--accent-red)'; return; }
  o.ruecklage=o.ruecklage||{stand:0,bewegungen:[]};
  const data={datum:g('b_datum').value||null,art:(art==='entnahme'?'entnahme':'zufuehrung'),betrag,zweck:g('b_zweck').value.trim()};
  if(bId){ Object.assign(o.ruecklage.bewegungen.find(x=>x.id===bId),data); }
  else{ o.ruecklage.bewegungen.push({id:uid(),...data}); }
  o.ruecklage.stand=ruecklageStand(o); o.geaendert=Date.now(); save(); closeModal(); render();
}
function deleteBewegung(objId,bId){ const o=_o(objId); o.ruecklage.bewegungen=o.ruecklage.bewegungen.filter(x=>x.id!==bId); o.ruecklage.stand=ruecklageStand(o); o.geaendert=Date.now(); save(); render(); }

/* PDF: Rücklagen-Kontoauszug */
function ruecklagePdf(objId){
  if(!pdfReady()){ alert('PDF-Bibliothek wird noch geladen \u2013 bitte gleich erneut.'); return; }
  const o=_o(objId); const {jsPDF}=window.jspdf, doc=new jsPDF('p','mm','a4');
  const P=TW_PDF, ML=P.MARGIN_L, MR=P.MARGIN_R, MB=P.MARGIN_B, rx=P.PAGE_W-MR;
  const foot=()=>tw_drawBriefkopfFooter(doc,doc.internal.getNumberOfPages());
  const E=v=>eur(v).replace(/\u00a0/g,' ');
  let y=tw_drawBriefkopfHeader(doc);
  doc.setFont('helvetica','bold'); doc.setFontSize(15); doc.setTextColor(17,17,17); doc.text('Erhaltungsr\u00fccklage \u2013 Kontoauszug',ML,y+2);
  doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(136,136,136); doc.text('Stand: '+new Date().toLocaleDateString('de-DE'),rx,y+2,{align:'right'}); y+=11;
  doc.setFont('helvetica','bold'); doc.setFontSize(12); doc.setTextColor(17,17,17); doc.text(o.bezeichnung,ML,y); y+=5;
  const adr=[o.strasse,[o.plz,o.ort].filter(Boolean).join(' ')].filter(Boolean).join(', ');
  doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(51,51,51); if(adr){ doc.text(adr,ML,y); y+=5; }
  const eck=[]; if(o.mea!=null&&o.mea!=='') eck.push('MEA: '+o.mea); if(o.hausgeld!=null&&o.hausgeld!=='') eck.push('Hausgeld: '+E(o.hausgeld)+'/Monat');
  if(eck.length){ doc.setFontSize(9.5); doc.setTextColor(80,80,80); doc.text(eck.join('   \u00b7   '),ML,y); y+=5; }
  y+=3;
  const bew=[...((o.ruecklage&&o.ruecklage.bewegungen)||[])].sort((a,b)=>String(a.datum||'').localeCompare(String(b.datum||'')));
  let run=0;
  let rows=bew.map(x=>{ const ein=x.art!=='entnahme', b=Number(x.betrag)||0; run+=ein?b:-b; return [fmtDate(x.datum), ein?'Zuf\u00fchrung':'Entnahme', x.zweck||'', (ein?'+ ':'- ')+E(b), E(run)]; });
  if(rows.length===0) rows=[[{content:'Keine Bewegungen erfasst.',colSpan:5,styles:{textColor:[136,136,136],fontStyle:'italic'}}]];
  doc.autoTable({ startY:y, margin:{left:ML,right:MR,bottom:MB+8},
    head:[['Datum','Art','Zweck','Betrag','Saldo']], body:rows, theme:'grid', showHead:'everyPage',
    styles:{font:'helvetica',fontSize:8.5,textColor:[34,34,34],cellPadding:{top:2,bottom:2,left:2,right:2},lineColor:[224,224,224],lineWidth:0.15,overflow:'linebreak'},
    headStyles:{fillColor:[196,30,30],textColor:[255,255,255],fontStyle:'bold',fontSize:8.5},
    columnStyles:{0:{cellWidth:22},1:{cellWidth:24},2:{cellWidth:'auto'},3:{cellWidth:30,halign:'right'},4:{cellWidth:30,halign:'right'}},
    foot:[[{content:'Aktueller Stand',colSpan:4,styles:{halign:'right',fontStyle:'bold'}},{content:E(ruecklageStand(o)),styles:{halign:'right',fontStyle:'bold'}}]],
    footStyles:{fillColor:[240,240,240],textColor:[17,17,17],fontSize:9}, didDrawPage:foot });
  y=doc.lastAutoTable.finalY+8;
  if((o.beschluesse||[]).length){
    if(y>P.PAGE_H-MB-30){ doc.addPage(); y=P.MARGIN_T; }
    doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.setTextColor(196,30,30); doc.text('Beschl\u00fcsse & Protokolle',ML,y);
    doc.autoTable({ startY:y+2.5, margin:{left:ML,right:MR,bottom:MB+8},
      head:[['Datum','Beschluss','Ergebnis / Notiz']], body:o.beschluesse.map(x=>[fmtDate(x.datum),x.titel,x.text||'']),
      theme:'grid', showHead:'everyPage',
      styles:{font:'helvetica',fontSize:8.5,textColor:[34,34,34],cellPadding:{top:2,bottom:2,left:2,right:2},lineColor:[224,224,224],lineWidth:0.15,overflow:'linebreak'},
      headStyles:{fillColor:[196,30,30],textColor:[255,255,255],fontStyle:'bold',fontSize:8.5},
      columnStyles:{0:{cellWidth:22},1:{cellWidth:60},2:{cellWidth:'auto'}}, didDrawPage:foot });
    y=doc.lastAutoTable.finalY+8;
  }
  if((o.sonderumlagen||[]).length){
    if(y>P.PAGE_H-MB-30){ doc.addPage(); y=P.MARGIN_T; }
    doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.setTextColor(196,30,30); doc.text('Sonderumlagen',ML,y);
    doc.autoTable({ startY:y+2.5, margin:{left:ML,right:MR,bottom:MB+8},
      head:[['Datum','Zweck','Betrag']], body:o.sonderumlagen.map(x=>[fmtDate(x.datum),x.zweck,E(x.betrag)]),
      theme:'grid', showHead:'everyPage',
      styles:{font:'helvetica',fontSize:8.5,textColor:[34,34,34],cellPadding:{top:2,bottom:2,left:2,right:2},lineColor:[224,224,224],lineWidth:0.15},
      headStyles:{fillColor:[196,30,30],textColor:[255,255,255],fontStyle:'bold',fontSize:8.5},
      columnStyles:{0:{cellWidth:22},1:{cellWidth:'auto'},2:{cellWidth:32,halign:'right'}}, didDrawPage:foot });
  }
  doc.save('Ruecklage_'+(o.bezeichnung||'WEG').replace(/[^a-zA-Z0-9 _-]/g,'').trim().replace(/ +/g,'_')+'.pdf');
}

/* ---------- PDF: Objekt-Datenblatt (nutzt gemeinsamen Briefkopf) ---------- */

  const {jsPDF}=window.jspdf, doc=new jsPDF('p','mm','a4');

  const adr=[o.strasse,[o.plz,o.ort].filter(Boolean).join(' ')].filter(Boolean).join(', ');
  if(adr){ doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(51,51,51); doc.text(adr,ML,y); y+=5; }
  y+=2;
  doc.autoTable({ startY:y, margin:{left:ML,right:MR,bottom:MB+8}, theme:'plain',
    styles:{font:'helvetica',fontSize:9.5,textColor:[34,34,34],cellPadding:{top:1.2,bottom:1.2,left:0,right:2}},
    columnStyles:{0:{cellWidth:48,textColor:[136,136,136]},1:{cellWidth:'auto'}},
    body:[['Objektart',ART[o.art]],['Baujahr',o.baujahr?String(o.baujahr):'\u2014'],
      ['Gesamtwohnfl\u00e4che',o.gesamtwohnflaeche?o.gesamtwohnflaeche+' m2':'\u2014'],
      ['Heizung',o.heizung||'\u2014'],['Einheiten',String((o.einheiten||[]).length)]],
    didDrawPage:foot });
  y=doc.lastAutoTable.finalY+9;
  const eh=o.einheiten||[];
  eh.forEach(e=>{
    if(y>P.PAGE_H-MB-30){ doc.addPage(); y=P.MARGIN_T; }
    doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.setTextColor(196,30,30);
    const meta=[(e.wohnflaeche?e.wohnflaeche+' m2':null),(e.zimmer?e.zimmer+' Zi.':null)].filter(Boolean).join(' \u00b7 ');
    doc.text(e.bezeichnung+(meta?'   ('+meta+')':''),ML,y);
    const mv=[...(e.mietverhaeltnisse||[])].sort((a,b)=>String(b.einzug||'').localeCompare(String(a.einzug||'')));
    let rows=mv.map(m=>[m.mieter||'\u2014',fmtDate(m.einzug),m.auszug?fmtDate(m.auszug):'laufend',eur(m.kaltmiete),eur(m.nkVoraus),eur(m.kaution),m.auszug?'Archiv':'aktiv']);
    if(rows.length===0) rows=[[{content:'Noch kein Mietverh\u00e4ltnis erfasst.',colSpan:7,styles:{textColor:[136,136,136],fontStyle:'italic'}}]];
    doc.autoTable({ startY:y+2.5, margin:{left:ML,right:MR,bottom:MB+8},
      head:[['Mieter','Einzug','Auszug','Kaltmiete','NK-Voraus.','Kaution','Status']], body:rows,
      theme:'grid', showHead:'everyPage',
      styles:{font:'helvetica',fontSize:8.5,textColor:[34,34,34],cellPadding:{top:2,bottom:2,left:2,right:2},lineColor:[224,224,224],lineWidth:0.15,overflow:'linebreak'},
      headStyles:{fillColor:[196,30,30],textColor:[255,255,255],fontStyle:'bold',fontSize:8.5},
      columnStyles:{0:{cellWidth:'auto'},1:{cellWidth:20},2:{cellWidth:20},3:{cellWidth:22,halign:'right'},4:{cellWidth:23,halign:'right'},5:{cellWidth:20,halign:'right'},6:{cellWidth:16,halign:'center'}},
      didDrawPage:foot });
    y=doc.lastAutoTable.finalY+9;
  });
  if(eh.length===0){ doc.setFont('helvetica','italic'); doc.setFontSize(9.5); doc.setTextColor(136,136,136); doc.text('Noch keine Einheiten angelegt.',ML,y); y+=9; }
  const dk=o.dokumente||[];
  if(dk.length){
    if(y>P.PAGE_H-MB-30){ doc.addPage(); y=P.MARGIN_T; }
    doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.setTextColor(196,30,30); doc.text('Dokumente',ML,y);
    doc.autoTable({ startY:y+2.5, margin:{left:ML,right:MR,bottom:MB+8},
      head:[['Bezeichnung','Art','Datum']], body:dk.map(d=>[d.name,d.art||'Dokument',fmtDate(d.datum)]),
      theme:'grid', showHead:'everyPage',
      styles:{font:'helvetica',fontSize:8.5,textColor:[34,34,34],cellPadding:{top:2,bottom:2,left:2,right:2},lineColor:[224,224,224],lineWidth:0.15},
      headStyles:{fillColor:[196,30,30],textColor:[255,255,255],fontStyle:'bold',fontSize:8.5},
      columnStyles:{0:{cellWidth:'auto'},1:{cellWidth:34},2:{cellWidth:26}}, didDrawPage:foot });
  }
  doc.save('Objekt-Datenblatt_'+(o.bezeichnung||'Objekt').replace(/[^a-zA-Z0-9 _-]/g,'').trim().replace(/ +/g,'_')+'.pdf');
}

/* ---------- Finder ---------- */
function _o(id){ return state.objekte.find(x=>x.id===id); }
function _e(o,id){ return (o.einheiten||[]).find(x=>x.id===id); }

/* ---------- Einheit-Modal ---------- */
function openEinheitModal(objId, ehId){
  const o=_o(objId); const e=ehId?_e(o,ehId):null;
  document.getElementById('mTitle').textContent=e?'Einheit bearbeiten':'Neue Einheit';
  document.getElementById('mBody').innerHTML=
     '<div class="field"><label>Bezeichnung *</label><input id="e_bez" value="'+esc(e?e.bezeichnung:'')+'" placeholder="z. B. Whg 1 \u00b7 EG links"></div>'
    +'<div class="row2"><div class="field"><label>Wohnfl\u00e4che (m\u00b2)</label><input id="e_qm" type="number" step="0.01" value="'+(e&&e.wohnflaeche?e.wohnflaeche:'')+'" placeholder="78"></div>'
    +'<div class="field"><label>Zimmer</label><input id="e_zi" type="number" step="0.5" value="'+(e&&e.zimmer?e.zimmer:'')+'" placeholder="3"></div></div>';
  document.getElementById('mFoot').innerHTML=
     '<button class="btn btn-red" onclick="closeModal()">Abbrechen</button>'
    +'<button class="btn btn-blue" onclick="saveEinheit(\''+objId+'\',\''+(ehId||'')+'\')">'+(e?'Speichern':'Anlegen')+'</button>';
  openModal(); setTimeout(()=>{const f=document.getElementById('e_bez'); if(f)f.focus();},60);
}
function saveEinheit(objId, ehId){
  const o=_o(objId); const g=x=>document.getElementById(x);
  const bez=g('e_bez').value.trim(); if(!bez){ g('e_bez').focus(); g('e_bez').style.borderColor='var(--accent-red)'; return; }
  const data={bezeichnung:bez,wohnflaeche:parseFloat(g('e_qm').value)||0,zimmer:parseFloat(g('e_zi').value)||null};
  if(ehId){ Object.assign(_e(o,ehId),data); }
  else{ o.einheiten=o.einheiten||[]; o.einheiten.push({id:uid(),...data,mietverhaeltnisse:[]}); }
  o.geaendert=Date.now(); save(); closeModal(); render();
}
function deleteEinheit(objId, ehId){
  const o=_o(objId); const e=_e(o,ehId);
  document.getElementById('mTitle').textContent='Einheit entfernen';
  document.getElementById('mBody').innerHTML='<p class="q">Einheit <b>'+esc(e.bezeichnung)+'</b> samt aller Mietverh\u00e4ltnisse entfernen?</p>';
  document.getElementById('mFoot').innerHTML='<button class="btn btn-ghost" onclick="closeModal()">Abbrechen</button><button class="btn btn-red" onclick="confirmDeleteEinheit(\''+objId+'\',\''+ehId+'\')">Entfernen</button>';
  openModal();
}
function confirmDeleteEinheit(objId, ehId){ const o=_o(objId); o.einheiten=o.einheiten.filter(x=>x.id!==ehId); o.geaendert=Date.now(); save(); closeModal(); render(); }

function saveMv(objId, ehId, mvId){
  const o=_o(objId); const e=_e(o,ehId); const g=x=>document.getElementById(x);
  const name=g('m_name').value.trim(); if(!name){ g('m_name').focus(); g('m_name').style.borderColor='var(--accent-red)'; return; }
  const data={mieter:name,einzug:g('m_ein').value||null,auszug:g('m_aus').value||null,
    kaltmiete:parseFloat(g('m_km').value)||0,nkVoraus:parseFloat(g('m_nk').value)||0,kaution:parseFloat(g('m_ka').value)||0,
    notiz:g('m_notiz').value.trim(),geaendert:Date.now()};
  e.mietverhaeltnisse=e.mietverhaeltnisse||[];
  if(mvId){ Object.assign(e.mietverhaeltnisse.find(x=>x.id===mvId),data); }
  else{ e.mietverhaeltnisse.push({id:uid(),...data}); }
  o.geaendert=Date.now(); save(); closeModal(); render();
}
function endMv(objId, ehId, mvId){
  const today=new Date().toISOString().slice(0,10);
  document.getElementById('mTitle').textContent='Auszug eintragen';
  document.getElementById('mBody').innerHTML='<p class="q" style="margin-bottom:12px">Auszugsdatum festlegen. Das Mietverh\u00e4ltnis bleibt als <b>Archiv</b> unter der Einheit erhalten.</p>'
    +'<div class="field"><label>Auszug am</label><input id="m_ausdate" type="date" value="'+today+'"></div>';
  document.getElementById('mFoot').innerHTML='<button class="btn btn-red" onclick="closeModal()">Abbrechen</button><button class="btn btn-blue" onclick="confirmEndMv(\''+objId+'\',\''+ehId+'\',\''+mvId+'\')">Auszug speichern</button>';
  openModal();
}
function confirmEndMv(objId, ehId, mvId){
  const o=_o(objId); const e=_e(o,ehId); const m=e.mietverhaeltnisse.find(x=>x.id===mvId);
  m.auszug=document.getElementById('m_ausdate').value||new Date().toISOString().slice(0,10); m.geaendert=Date.now();
  o.geaendert=Date.now(); save(); closeModal(); render();
}
function deleteMv(objId, ehId, mvId){
  const o=_o(objId); const e=_e(o,ehId); const m=e.mietverhaeltnisse.find(x=>x.id===mvId);
  document.getElementById('mTitle').textContent='Mietverh\u00e4ltnis entfernen';
  document.getElementById('mBody').innerHTML='<p class="q">Mietverh\u00e4ltnis <b>'+esc(m.mieter)+'</b> wirklich l\u00f6schen? Zum Beenden besser \u201eAuszug eintragen\u201c nutzen \u2013 so bleibt die Historie erhalten.</p>';
  document.getElementById('mFoot').innerHTML='<button class="btn btn-ghost" onclick="closeModal()">Abbrechen</button><button class="btn btn-red" onclick="confirmDeleteMv(\''+objId+'\',\''+ehId+'\',\''+mvId+'\')">Entfernen</button>';
  openModal();
}
function confirmDeleteMv(objId, ehId, mvId){ const o=_o(objId); const e=_e(o,ehId); e.mietverhaeltnisse=e.mietverhaeltnisse.filter(x=>x.id!==mvId); o.geaendert=Date.now(); save(); closeModal(); render(); }

/* ---------- Dokument-Modal ---------- */
function openDokModal(objId){
  const today=new Date().toISOString().slice(0,10);
  document.getElementById('mTitle').textContent='Dokument vermerken';
  document.getElementById('mBody').innerHTML=
     '<div class="field"><label>Bezeichnung *</label><input id="d_name" placeholder="z. B. Mietvertrag Fam. Becker"></div>'
    +'<div class="field"><label>Art</label><select id="d_art"><option>Vertrag</option><option>Protokoll</option><option>Abrechnung</option><option>Schreiben</option><option>Sonstiges</option></select></div>'
    +'<div class="field"><label>Datum</label><input id="d_datum" type="date" value="'+today+'"></div>';
  document.getElementById('mFoot').innerHTML='<button class="btn btn-red" onclick="closeModal()">Abbrechen</button><button class="btn btn-blue" onclick="saveDok(\''+objId+'\')">Vermerken</button>';
  openModal(); setTimeout(()=>{const f=document.getElementById('d_name'); if(f)f.focus();},60);
}
function saveDok(objId){
  const o=_o(objId); const g=x=>document.getElementById(x);
  const name=g('d_name').value.trim(); if(!name){ g('d_name').focus(); g('d_name').style.borderColor='var(--accent-red)'; return; }
  o.dokumente=o.dokumente||[]; o.dokumente.unshift({id:uid(),name,art:g('d_art').value,datum:g('d_datum').value||null});
  o.geaendert=Date.now(); save(); closeModal(); render();
}
function deleteDok(objId, dokId){ const o=_o(objId); o.dokumente=(o.dokumente||[]).filter(x=>x.id!==dokId); o.geaendert=Date.now(); save(); render(); }

/* ---------- Objekt-Modal ---------- */
function openObjektModal(id){
  const o=id?state.objekte.find(x=>x.id===id):null;
  document.getElementById('mTitle').textContent=o?'Objekt bearbeiten':'Neues Objekt';
  document.getElementById('mBody').innerHTML=
     '<div class="field"><label>Objektart</label><select id="f_art">'
    +'<option value="einzel"'+(o&&o.art==='einzel'?' selected':'')+'>Einzelimmobilie (eine Einheit)</option>'
    +'<option value="mfh"'+(o&&o.art==='mfh'?' selected':'')+'>Mehrfamilienhaus (mehrere Einheiten)</option>'
    +'<option value="weg"'+(o&&o.art==='weg'?' selected':'')+'>WEG-Eigentum</option>'
    +'<option value="eigen"'+(o&&o.art==='eigen'?' selected':'')+'>Eigennutzung</option>'
    +'</select><div class="hint">Einzelimmobilie & Eigennutzung erhalten automatisch eine Einheit.</div></div>'
    +'<div class="field"><label>Bezeichnung *</label><input id="f_bez" value="'+esc(o?o.bezeichnung:'')+'" placeholder="z. B. Haus Flurweg 14a"></div>'
    +'<div class="field"><label>Stra\u00dfe & Hausnr.</label><input id="f_str" value="'+esc(o?o.strasse:'')+'" placeholder="Musterstra\u00dfe 1"></div>'
    +'<div class="row2"><div class="field"><label>PLZ</label><input id="f_plz" value="'+esc(o?o.plz:'')+'" placeholder="56472"></div>'
    +'<div class="field"><label>Ort</label><input id="f_ort" value="'+esc(o?o.ort:'')+'" placeholder="Nisterau"></div></div>'
    +'<div class="row2"><div class="field"><label>Baujahr</label><input id="f_bj" type="number" value="'+(o&&o.baujahr?o.baujahr:'')+'" placeholder="1998"></div>'
    +'<div class="field"><label>Wohnfl\u00e4che (m\u00b2)</label><input id="f_qm" type="number" step="0.01" value="'+(o&&o.gesamtwohnflaeche?o.gesamtwohnflaeche:'')+'" placeholder="120"></div></div>'
    +'<div class="field"><label>Heizung</label><input id="f_heiz" value="'+esc(o?o.heizung:'')+'" placeholder="\u00d6l-Zentralheizung"></div>'
    +'<div class="field"><label>Notiz</label><textarea id="f_notiz" placeholder="frei">'+esc(o?o.notiz:'')+'</textarea></div>';
  document.getElementById('mFoot').innerHTML=
     '<button class="btn btn-red" onclick="closeModal()">Abbrechen</button>'
    +'<button class="btn btn-blue" onclick="saveObjekt(\''+(id||'')+'\')">'+(o?'Speichern':'Anlegen')+'</button>';
  openModal(); setTimeout(()=>{const f=document.getElementById('f_bez'); if(f)f.focus();},60);
}
function saveObjekt(id){
  const g=x=>document.getElementById(x);
  const bez=g('f_bez').value.trim();
  if(!bez){ g('f_bez').focus(); g('f_bez').style.borderColor='var(--accent-red)'; return; }
  const art=g('f_art').value, qm=parseFloat(g('f_qm').value)||0;
  const data={art,bezeichnung:bez,strasse:g('f_str').value.trim(),plz:g('f_plz').value.trim(),ort:g('f_ort').value.trim(),
    baujahr:parseInt(g('f_bj').value)||null,gesamtwohnflaeche:qm,heizung:g('f_heiz').value.trim(),notiz:g('f_notiz').value.trim(),geaendert:Date.now()};
  if(id){ Object.assign(state.objekte.find(x=>x.id===id),data); }
  else{
    const einheiten=(art==='einzel'||art==='eigen')?[{id:uid(),bezeichnung:'Gesamtobjekt',wohnflaeche:qm,zimmer:null,mietverhaeltnisse:[]}]:[];
    state.objekte.push({id:uid(),...data,einheiten,dokumente:[],ruecklage:art==='weg'?{stand:0,bewegungen:[]}:null,mea:null});
  }
  save(); closeModal();
  if(view==='home') render(); else go(id?'detail':'home', id||null);
}
function deleteObjekt(id){
  const o=state.objekte.find(x=>x.id===id);
  document.getElementById('mTitle').textContent='Objekt l\u00f6schen';
  document.getElementById('mBody').innerHTML='<p class="q">Soll das Objekt <b>'+esc(o.bezeichnung)+'</b> samt aller hinterlegten Daten unwiderruflich gel\u00f6scht werden?</p>';
  document.getElementById('mFoot').innerHTML='<button class="btn btn-ghost" onclick="closeModal()">Abbrechen</button><button class="btn btn-red" onclick="confirmDelete(\''+id+'\')">Endg\u00fcltig l\u00f6schen</button>';
  openModal();
}
function confirmDelete(id){ state.objekte=state.objekte.filter(x=>x.id!==id); save(); closeModal(); go('home'); }

/* ---------- Beispielobjekt ---------- */

  state.objekte.push({id:uid(),art:'mfh',bezeichnung:'Haus Flurweg 14a',strasse:'Flurweg 14a',plz:'56472',ort:'Nisterau',
    baujahr:1996,gesamtwohnflaeche:210,heizung:'\u00d6l-Zentralheizung',notiz:'Beispielobjekt \u2013 jederzeit l\u00f6schbar.',
    geaendert:Date.now(),dokumente:[],ruecklage:null,mea:null,
    einheiten:[
      {id:uid(),bezeichnung:'Whg 1 \u00b7 EG links',wohnflaeche:78,zimmer:3,mietverhaeltnisse:[{id:uid(),mieter:'Fam. Becker',einzug:'2021-04-01',auszug:null,kaltmiete:640,nkVoraus:160,kaution:1920,notiz:''}]},
      {id:uid(),bezeichnung:'Whg 2 \u00b7 OG rechts',wohnflaeche:92,zimmer:4,mietverhaeltnisse:[]}
    ]});
  save(); render();
}

/* ---------- Sichern / Einspielen / Löschen ---------- */
function exportData(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='hausverwaltung-sicherung-'+new Date().toISOString().slice(0,10)+'.json';
  a.click(); URL.revokeObjectURL(a.href);
}
document.getElementById('importFile').addEventListener('change',e=>{
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{ try{ const d=JSON.parse(r.result); if(!d||!Array.isArray(d.objekte))throw 0; state=d; save(); go('home'); }
    catch(err){ alert('Datei konnte nicht gelesen werden. Bitte eine g\u00fcltige Sicherungsdatei w\u00e4hlen.'); } };
  r.readAsText(f); e.target.value='';
});
function wipe(){
  document.getElementById('mTitle').textContent='Alle Daten l\u00f6schen';
  document.getElementById('mBody').innerHTML='<p class="q">Wirklich <b>alle Objekte und Daten</b> unwiderruflich l\u00f6schen? Vorher ggf. sichern.</p>';
  document.getElementById('mFoot').innerHTML='<button class="btn btn-ghost" onclick="closeModal()">Abbrechen</button><button class="btn btn-red" onclick="confirmWipe()">Ja, alles l\u00f6schen</button>';
  openModal();
}
function confirmWipe(){ state={objekte:[],einstellungen:{version:'1.0'}}; save(); closeModal(); go('home'); }

/* ---------- Modal-Steuerung ---------- */
function openModal(){ document.getElementById('overlay').classList.add('open'); }
function closeModal(){ document.getElementById('overlay').classList.remove('open'); }
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

/* ---------- Start ---------- */
(async()=>{ await load(); render(); })();
</script>
</body>
