/* ============================================================
   OBJEKT ANLEGEN  ·  Assistent (Schritt 1 Art, Schritt 2 Maske)
   Die Eingabemaske richtet sich nach der Objektart: Einzel/Eigen
   = eine Wohnung; MFH/WEG = beliebig viele Parteien direkt erfassbar.
   ============================================================ */
const ICON_MFH='<rect x="7" y="4" width="18" height="24" rx="1.5" stroke="white" stroke-width="2" fill="none"/><line x1="7" y1="11" x2="25" y2="11" stroke="white" stroke-width="1.4"/><line x1="7" y1="18" x2="25" y2="18" stroke="white" stroke-width="1.4"/><rect x="10.5" y="6.5" width="4" height="3" stroke="white" stroke-width="1.1" fill="none"/><rect x="17.5" y="6.5" width="4" height="3" stroke="white" stroke-width="1.1" fill="none"/><rect x="10.5" y="13.5" width="4" height="3" stroke="white" stroke-width="1.1" fill="none"/><rect x="17.5" y="13.5" width="4" height="3" stroke="white" stroke-width="1.1" fill="none"/><rect x="14" y="22" width="4" height="6" stroke="white" stroke-width="1.1" fill="none"/>';
let wizardData={art:'',units:[]};
function mkUnit(bez){ return {bez:bez||'',qm:'',zi:'',mieter:'',einzug:'',km:'',nk:'',ka:''}; }
function isSingle(art){ return art==='einzel'||art==='eigen'; }

function openObjektWizard(){ wizardData={art:'',units:[]}; wizStep1(); openModal(); }

function wizStep1(){
  document.getElementById('mTitle').textContent='Neues Objekt \u2013 Art w\u00e4hlen';
  const card=(art,icon,desc)=>'<button type="button" class="wiz-art" onclick="wizSelectArt(\''+art+'\')"><span class="ic">'+svgWrapC(icon)+'</span><span class="wa-txt"><span class="wa-t">'+ART[art]+'</span><span class="wa-d">'+desc+'</span></span><span class="wa-arrow">\u2192</span></button>';
  document.getElementById('mBody').innerHTML=
     '<p class="hint" style="margin-bottom:14px">Bitte zuerst die Objektart w\u00e4hlen \u2013 die Eingabemaske passt sich automatisch daran an.</p>'
    +card('einzel',I.haus,'Einfamilienhaus oder einzelne Wohnung \u2013 eine Partei')
    +card('mfh',ICON_MFH,'Mehrere Wohnungen / Parteien (z. B. F\u00fcnffamilienhaus)')
    +card('weg',I.weg,'Eigentum in einer Eigent\u00fcmergemeinschaft')
    +card('eigen',I.haus,'Selbst genutzte Immobilie \u2013 eine Einheit');

}

function wizSelectArt(art){
  wizardData={art,units: isSingle(art)?[mkUnit('Gesamtobjekt')]:[mkUnit('Whg 1'),mkUnit('Whg 2')]};
  wizStep2();
}

function wizStep2(){
  const art=wizardData.art, single=isSingle(art), weg=(art==='weg');
  document.getElementById('mTitle').textContent='Neues Objekt';
  let html='<div class="wiz-artbadge">'+ART[art]+'</div>'
    +'<div class="field"><label>Bezeichnung des Objekts *</label><input id="w_bez" placeholder="z. B. Haus Flurweg 14a"></div>'
    +'<div class="field"><label>Stra\u00dfe & Hausnr.</label><input id="w_str" placeholder="Musterstra\u00dfe 1"></div>'
    +'<div class="row2"><div class="field"><label>PLZ</label><input id="w_plz" placeholder="56472"></div>'
    +'<div class="field"><label>Ort</label><input id="w_ort" placeholder="Nisterau"></div></div>'
    +'<div class="row2"><div class="field"><label>Baujahr</label><input id="w_bj" type="number" placeholder="1998"></div>'
    +'<div class="field"><label>Heizung</label><input id="w_heiz" placeholder="\u00d6l-Zentralheizung"></div></div>';
  if(weg) html+='<div class="row2"><div class="field"><label>Miteigentumsanteil (MEA)</label><input id="w_mea" placeholder="z. B. 286,68/1000"></div>'
    +'<div class="field"><label>R\u00fccklage-Anfangsstand (\u20ac)</label><input id="w_ruck" type="number" step="0.01" placeholder="0"></div></div>';
  html+='<div class="wiz-sec">'+(single?'Wohnung & Mieter':'Parteien / Wohnungen')+'</div>';
  if(!single) html+='<div class="wiz-count"><div class="cwrap"><label>Anzahl Parteien</label><input id="wizCount" type="number" min="1" max="20" value="'+wizardData.units.length+'" onchange="wizSetCount(this.value)"></div><button type="button" class="btn btn-blue btn-sm" onclick="wizAddUnit()">+ Weitere Partei</button></div>';
  html+='<div id="wizUnits">'+wizUnitsHtml()+'</div>';
  html+='<div class="field"><label>Notiz</label><textarea id="w_notiz" placeholder="frei"></textarea></div>';
  document.getElementById('mBody').innerHTML=html;
  document.getElementById('mFoot').innerHTML=
     '<button class="btn btn-red" onclick="wizBack()">\u2190 Zur\u00fcck</button>'
    +'<button class="btn btn-blue" onclick="wizSave()">Objekt anlegen</button>';
  setTimeout(()=>{const f=document.getElementById('w_bez'); if(f)f.focus();},60);
}

function wizUnitsHtml(){
  const single=isSingle(wizardData.art);
  return wizardData.units.map((u,i)=>{
    const head = single
      ? '<div class="wiz-uhead"><span>Wohnung</span></div>'
      : '<div class="wiz-uhead"><span>Partei '+(i+1)+'</span>'+(wizardData.units.length>1?'<button type="button" class="wiz-rm" onclick="wizRemoveUnit('+i+')">\u2715 entfernen</button>':'')+'</div>';
    const bezField = single ? ''
      : '<div class="field"><label>Bezeichnung der Wohnung</label><input value="'+esc(u.bez)+'" oninput="wizU('+i+',\'bez\',this.value)" placeholder="z. B. Whg '+(i+1)+' \u00b7 EG links"></div>';
    return '<div class="wiz-unit">'+head+bezField
      +'<div class="row2"><div class="field"><label>Wohnfl\u00e4che (m\u00b2)</label><input type="number" step="0.01" value="'+esc(u.qm)+'" oninput="wizU('+i+',\'qm\',this.value)" placeholder="78"></div>'
      +'<div class="field"><label>Zimmer</label><input type="number" step="0.5" value="'+esc(u.zi)+'" oninput="wizU('+i+',\'zi\',this.value)" placeholder="3"></div></div>'
      +'<div class="wiz-sub">Aktueller Mieter \u2013 optional, leer lassen, wenn die Wohnung frei ist.</div>'
      +'<div class="field"><label>Mieter</label><input value="'+esc(u.mieter)+'" oninput="wizU('+i+',\'mieter\',this.value)" placeholder="Name / Familie"></div>'
      +'<div class="row2"><div class="field"><label>Einzug</label><input type="date" value="'+esc(u.einzug)+'" oninput="wizU('+i+',\'einzug\',this.value)"></div>'
      +'<div class="field"><label>Kaution (\u20ac)</label><input type="number" step="0.01" value="'+esc(u.ka)+'" oninput="wizU('+i+',\'ka\',this.value)" placeholder="1920"></div></div>'
      +'<div class="row2"><div class="field"><label>Kaltmiete (\u20ac/Mon.)</label><input type="number" step="0.01" value="'+esc(u.km)+'" oninput="wizU('+i+',\'km\',this.value)" placeholder="640"></div>'
      +'<div class="field"><label>NK-Voraus. (\u20ac/Mon.)</label><input type="number" step="0.01" value="'+esc(u.nk)+'" oninput="wizU('+i+',\'nk\',this.value)" placeholder="160"></div></div>'
      +'</div>';
  }).join('');
}

function wizU(i,k,v){ if(wizardData.units[i]) wizardData.units[i][k]=v; }
function wizRenderUnits(){ const c=document.getElementById('wizUnits'); if(c)c.innerHTML=wizUnitsHtml(); const cc=document.getElementById('wizCount'); if(cc)cc.value=wizardData.units.length; }
function wizSetCount(v){ let n=Math.max(1,Math.min(20,parseInt(v)||1)); const u=wizardData.units; while(u.length<n)u.push(mkUnit('Whg '+(u.length+1))); if(u.length>n)u.length=n; wizRenderUnits(); }
function wizAddUnit(){ if(wizardData.units.length>=20)return; wizardData.units.push(mkUnit('Whg '+(wizardData.units.length+1))); wizRenderUnits(); }
function wizRemoveUnit(i){ if(wizardData.units.length<=1)return; wizardData.units.splice(i,1); wizRenderUnits(); }
function wizBack(){ wizStep1(); }

function wizSave(){
  const g=x=>document.getElementById(x);
  const bez=g('w_bez').value.trim();
  if(!bez){ g('w_bez').focus(); g('w_bez').style.borderColor='var(--accent-red)'; return; }
  const art=wizardData.art, single=isSingle(art);
  const einheiten=wizardData.units.map((u,i)=>{
    const mv=[]; const mieter=(u.mieter||'').trim();
    if(mieter) mv.push({id:uid(),mieter,einzug:u.einzug||null,auszug:null,kaltmiete:parseFloat(u.km)||0,nkVoraus:parseFloat(u.nk)||0,kaution:parseFloat(u.ka)||0,notiz:'',geaendert:Date.now()});
    return {id:uid(),bezeichnung:(u.bez||'').trim()||(single?'Gesamtobjekt':'Whg '+(i+1)),wohnflaeche:parseFloat(u.qm)||0,zimmer:parseFloat(u.zi)||null,mietverhaeltnisse:mv};
  });
  const gesamt=einheiten.reduce((s,e)=>s+(Number(e.wohnflaeche)||0),0);
  const obj={id:uid(),art,bezeichnung:bez,strasse:g('w_str').value.trim(),plz:g('w_plz').value.trim(),ort:g('w_ort').value.trim(),
    baujahr:parseInt(g('w_bj').value)||null,gesamtwohnflaeche:gesamt,heizung:g('w_heiz').value.trim(),notiz:g('w_notiz').value.trim(),
    geaendert:Date.now(),einheiten,dokumente:[],
    ruecklage: art==='weg'?{stand:(g('w_ruck')?parseFloat(g('w_ruck').value):0)||0,bewegungen:[]}:null,
    mea: art==='weg'?(g('w_mea')?g('w_mea').value.trim():''):null};
  state.objekte.push(obj);
  save(); closeModal(); go('detail',obj.id);
}

function saveObjekt(id){
  const g=x=>document.getElementById(x);
  const bez=g('f_bez').value.trim();
  if(!bez){ g('f_bez').focus(); g('f_bez').style.borderColor='var(--accent-red)'; return; }
  const art=g('f_art').value, qm=parseFloat(g('f_qm').value)||0;
  const data={art,bezeichnung:bez,strasse:g('f_str').value.trim(),plz:g('f_plz').value.trim(),ort:g('f_ort').value.trim(),
    baujahr:parseInt(g('f_bj').value)||null,gesamtwohnflaeche:qm,heizung:g('f_heiz').value.trim(),notiz:g('f_notiz').value.trim(),geaendert:Date.now()};
  if(id){ Object.assign(state.objekte.find(x=>x.id===id),data); }
  else{
    const einheiten=(art==='einzel'||art==='eigen')?[{id:uid(),bezeichnung:'Gesamtobjekt',wohnflaeche:qm,zimmer:null,mietverhaeltnisse:[]}]:[];
    state.objekte.push({id:uid(),...data,einheiten,dokumente:[],ruecklage:art==='weg'?{stand:0,bewegungen:[]}:null,mea:null});
  }
  save(); closeModal();
  if(view==='objekte'||view==='detail') render(); else go('objekte');
}
function deleteObjekt(id){

    geaendert:Date.now(),dokumente:[],ruecklage:null,mea:null,
    einheiten:[
      {id:uid(),bezeichnung:'Whg 1 \u00b7 EG links',wohnflaeche:78,zimmer:3,mietverhaeltnisse:[{id:uid(),mieter:'Fam. Becker',einzug:'2021-04-01',auszug:null,kaltmiete:640,nkVoraus:160,kaution:1920,notiz:''}]},
      {id:uid(),bezeichnung:'Whg 2 \u00b7 OG rechts',wohnflaeche:92,zimmer:4,mietverhaeltnisse:[]}
    ]});
  save(); render();
}

/* ---------- Sichern / Einspielen / Löschen ---------- */
function exportData(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='hausverwaltung-sicherung-'+new Date().toISOString().slice(0,10)+'.json';
  a.click(); URL.revokeObjectURL(a.href);
}
document.getElementById('importFile').addEventListener('change',e=>{
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{ try{ const d=JSON.parse(r.result); if(!d||!Array.isArray(d.objekte))throw 0; state=d; save(); go('home'); }
    catch(err){ alert('Datei konnte nicht gelesen werden. Bitte eine g\u00fcltige Sicherungsdatei w\u00e4hlen.'); } };
  r.readAsText(f); e.target.value='';
});
document.getElementById('protoFile').addEventListener('change', async e=>{ const f=e.target.files; e.target.value=''; await protoIngest(f); });
document.getElementById('protoCamFile').addEventListener('change', async e=>{ const f=e.target.files; e.target.value=''; await protoIngest(f); });
function wipe(){
  document.getElementById('mTitle').textContent='Alle Daten l\u00f6schen';
  document.getElementById('mBody').innerHTML='<p class="q">Wirklich <b>alle Objekte und Daten</b> unwiderruflich l\u00f6schen? Vorher ggf. sichern.</p>';
  document.getElementById('mFoot').innerHTML='<button class="btn btn-ghost" onclick="closeModal()">Abbrechen</button><button class="btn btn-red" onclick="confirmWipe()">Ja, alles l\u00f6schen</button>';
  openModal();
}
function confirmWipe(){ state={objekte:[],einstellungen:{version:'1.0'}}; save(); closeModal(); go('home'); }

/* ---------- Modal-Steuerung ---------- */
function openModal(){ document.getElementById('overlay').classList.add('open'); }
function closeModal(){ document.getElementById('overlay').classList.remove('open'); }
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

/* ---------- Start ---------- */
(async()=>{ await load(); render(); if(cloudCfg.clientId&&cloudCfg.connected){ try{ await cloudConnect(false); }catch(e){} } })();
</script>
